name: Release

on:
  push:
    branches:
      - main
    tags:
      - "[0-9][0-9].[0-9][0-9]"        # CalVer  YY.MM
      - "[0-9][0-9].[0-9][0-9].[0-9]*" # CalVer  YY.MM.N

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create libraries zip
        run: zip -r IEC_Electrical_libraries.zip libraries/

      - name: Set release metadata
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            # Move the floating 'latest' tag to the current commit
            git tag -f latest
            git push origin latest --force
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          body: |
            ## Assets

            | File | Purpose |
            |------|---------|
            | `IEC_Electrical_libraries.zip` | **Recommended download.** All 20 per-category draw.io libraries in one zip. Import individual files from the zip via *Extras → Edit Diagram* or the draw.io library panel to keep your shape panel organised by topic. |
            | `IEC_Electrical.xml` | Single combined draw.io library containing every IEC symbol. Useful if you prefer one library file over many. Import via *Extras → Edit Diagram* or the draw.io library panel. |
            | `IEC_Stencils.xml` | Raw stencil bundle (draw.io `<shapes>` format). Use this to register all symbols as a custom stencil library or for tooling that consumes the stencil XML directly. |

            ## Changelog
          files: |
            IEC_Electrical_libraries.zip
            libraries/combined/IEC_Electrical.xml
            libraries/combined/IEC_Stencils.xml
